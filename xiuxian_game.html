<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>仙路漫漫 · 一念逍遥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#08080f;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.5;color:#e8e0d0;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
button,input{font-family:inherit;-webkit-user-select:auto;user-select:auto}
button{cursor:pointer;border:none;outline:none;background:none;-webkit-appearance:none}
:root{
  --gold:#d4a853;--gold2:#f0d080;--gold3:#b8922e;
  --cyan:#4ecdc4;--cyan2:#2ea8a0;
  --red:#e74c3c;--red2:#ff6b6b;
  --green:#2ecc71;--green2:#27ae60;
  --purple:#9b59b6;--purple2:#8e44ad;
  --blue:#3498db;--blue2:#2980b9;
  --pink:#e84393;
  --bg:#08080f;--bg2:#0e0e1a;--bg3:#151525;--bg4:#1e1e35;
  --border:#252540;--border2:#353555;
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ========== 开始界面 ========== */
#startScreen{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#08080f;transition:opacity .8s,transform .8s}
#startScreen.hide{opacity:0;transform:scale(1.1);pointer-events:none}
.start-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.start-bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(78,205,196,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(212,168,83,.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(155,89,182,.04) 0%,transparent 60%);animation:bgDrift 20s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-3%,2%) rotate(3deg)}}
.start-stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
.start-content{position:relative;z-index:2;text-align:center;padding:0 30px}
.start-logo{margin-bottom:8px}
.start-title{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:6px;text-shadow:none;filter:drop-shadow(0 0 20px rgba(212,168,83,.3))}
.start-subtitle{font-size:13px;color:rgba(232,224,208,.4);letter-spacing:8px;margin-top:4px}
.start-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);margin:24px auto}
.start-btn{display:block;width:220px;margin:12px auto;padding:14px 0;border-radius:30px;font-size:16px;font-weight:700;letter-spacing:4px;position:relative;overflow:hidden;transition:all .3s}
.start-btn:active{transform:scale(.95)}
.start-btn.primary{background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0a0a0f;box-shadow:0 4px 20px rgba(212,168,83,.3)}
.start-btn.primary::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.15) 50%,transparent 60%);animation:shimmer 3s infinite;pointer-events:none}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.start-btn.secondary{background:rgba(255,255,255,.05);color:var(--gold2);border:1px solid rgba(212,168,83,.3)}
.start-version{position:absolute;bottom:calc(var(--safe-bottom) + 20px);font-size:11px;color:rgba(232,224,208,.2);letter-spacing:2px}

/* ========== 角色选择 ========== */
#charSelect{position:fixed;inset:0;z-index:998;display:none;flex-direction:column;background:#08080f}
#charSelect.show{display:flex}
.cs-header{padding:var(--safe-top) 20px 10px;text-align:center}
.cs-header h2{font-size:20px;color:var(--gold2);font-weight:700;letter-spacing:3px}
.cs-header p{font-size:12px;color:rgba(232,224,208,.4);margin-top:4px}
.cs-body{flex:1;overflow-y:auto;padding:10px 20px;-webkit-overflow-scrolling:touch}
.cs-name-input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--gold2);font-size:16px;text-align:center;letter-spacing:2px;margin-bottom:16px;outline:none}
.cs-name-input:focus{border-color:var(--gold3);box-shadow:0 0 15px rgba(212,168,83,.15)}
.cs-name-input::placeholder{color:rgba(232,224,208,.2)}
.cs-label{font-size:13px;color:var(--gold);font-weight:600;margin:16px 0 10px;letter-spacing:2px;display:flex;align-items:center;gap:8px}
.cs-label::before{content:'';width:20px;height:1px;background:var(--gold3)}
.cs-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold3),transparent)}
.cs-chars{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cs-char{background:var(--bg3);border:2px solid var(--border);border-radius:16px;padding:16px 8px;text-align:center;transition:all .3s;position:relative;overflow:hidden}
.cs-char:active{transform:scale(.96)}
.cs-char.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,83,.2)}
.cs-char.selected::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(212,168,83,.1),transparent 70%)}
.cs-char .char-avatar{width:64px;height:80px;margin:0 auto 8px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.cs-char .char-name{font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px}
.cs-char .char-desc{font-size:10px;color:rgba(232,224,208,.4);line-height:1.4}
.cs-char .char-tags{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:6px}
.cs-char .char-tag{font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.05);color:rgba(232,224,208,.5)}
.cs-start-btn{display:block;width:100%;padding:14px;margin:20px 0;border-radius:30px;font-size:16px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0a0a0f;box-shadow:0 4px 20px rgba(212,168,83,.3);transition:all .3s}
.cs-start-btn:active{transform:scale(.96)}

/* ========== 游戏主界面 ========== */
#gameUI{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg)}
#gameUI.show{display:flex}

/* 顶部栏 */
.top-bar{padding:var(--safe-top) 12px 6px;background:linear-gradient(180deg,rgba(8,8,15,.95) 60%,rgba(8,8,15,.7));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.03)}
.top-row{display:flex;align-items:center;gap:10px}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar-circle{width:42px;height:42px;border-radius:50%;border:2px solid var(--gold3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,var(--bg4),var(--bg3));box-shadow:0 0 12px rgba(212,168,83,.15)}
.avatar-badge{position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0a0a0f;font-size:8px;padding:1px 6px;border-radius:8px;white-space:nowrap;font-weight:700;letter-spacing:1px}
.player-info{flex:1;min-width:0}
.player-name-row{display:flex;align-items:center;gap:6px}
.player-name{font-size:15px;font-weight:700;color:var(--gold2)}
.player-title{font-size:9px;padding:1px 6px;border-radius:4px;background:linear-gradient(135deg,var(--purple2),var(--purple));color:#fff;letter-spacing:1px}
.player-realm{font-size:11px;color:var(--cyan);margin-top:1px}
.top-res{display:flex;gap:8px;margin-top:6px}
.res-chip{display:flex;align-items:center;gap:3px;font-size:11px;background:rgba(255,255,255,.04);padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.04)}
.res-chip .ri{font-size:13px}
.res-chip .rv{color:var(--gold2);font-weight:600}
.xiuwei-bar-wrap{margin-top:6px;position:relative}
.xiuwei-bar{height:14px;background:var(--bg3);border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,.05);position:relative}
.xiuwei-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--cyan2),var(--cyan),var(--gold));transition:width .5s ease;position:relative}
.xiuwei-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);border-radius:7px 7px 0 0}
.xiuwei-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);white-space:nowrap;font-weight:500}

/* 主内容 */
.main-content{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;flex-direction:column;padding-bottom:4px}
.page.active{display:flex}
.page::-webkit-scrollbar{display:none}

/* 底部导航 */
.bottom-nav{display:flex;background:linear-gradient(0deg,rgba(8,8,15,.97),rgba(8,8,15,.9));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:2px 0 calc(2px + var(--safe-bottom));border-top:1px solid rgba(255,255,255,.04);z-index:100;flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 0;position:relative;transition:all .2s}
.nav-item .ni{font-size:20px;transition:all .2s;filter:grayscale(1) brightness(.5)}
.nav-item .nl{font-size:9px;color:rgba(232,224,208,.3);transition:all .2s;letter-spacing:1px}
.nav-item.active .ni{filter:none;transform:scale(1.1)}
.nav-item.active .nl{color:var(--gold);font-weight:600}
.nav-item.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:2px}
.nav-item:active{opacity:.7}
.nav-dot{position:absolute;top:3px;right:calc(50% - 16px);width:6px;height:6px;border-radius:50%;background:var(--red)}

/* ========== 城镇页 ========== */
.town-scene{min-height:100%;position:relative}
.town-bg{position:absolute;inset:0;background:linear-gradient(180deg,#08080f 0%,#0a0f1a 20%,#0f1a2e 50%,#0a1628 80%,#08080f 100%);overflow:hidden;pointer-events:none}
.town-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,rgba(78,205,196,.04),transparent 60%)}
.town-particles{position:absolute;inset:0;pointer-events:none}
.tp{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:tpFloat var(--d,6s) linear infinite var(--delay,0s)}
@keyframes tpFloat{0%{opacity:0;transform:translateY(0) scale(0)}10%{opacity:.6}90%{opacity:.1}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
.town-content{position:relative;z-index:2;padding:12px}
.section-hd{font-size:13px;font-weight:700;color:var(--gold2);padding:6px 0;display:flex;align-items:center;gap:8px;letter-spacing:1px}
.section-hd::before{content:'';width:3px;height:12px;background:var(--gold);border-radius:2px}
.building-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bld{background:linear-gradient(145deg,rgba(25,25,50,.9),rgba(15,15,35,.9));border:1px solid var(--border);border-radius:14px;padding:14px 6px;text-align:center;position:relative;overflow:hidden;transition:all .2s;-webkit-tap-highlight-color:transparent}
.bld:active{transform:scale(.94);border-color:rgba(212,168,83,.4)}
.bld::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.03),transparent 70%);pointer-events:none}
.bld .bi{font-size:28px;display:block;margin-bottom:6px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.bld .bn{font-size:12px;font-weight:600;color:var(--white);letter-spacing:1px}
.bld .bd{font-size:9px;color:rgba(232,224,208,.35);margin-top:3px}
.bld .bb{position:absolute;top:6px;right:6px;min-width:16px;height:16px;border-radius:8px;background:var(--red);color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700}
.news-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:8px}
.news-item{font-size:11px;color:rgba(232,224,208,.45);line-height:1.9;display:flex;align-items:flex-start;gap:6px}
.news-item::before{content:'·';color:var(--gold3);font-weight:700;margin-top:1px}

/* ========== 修炼页 ========== */
.cult-page{padding:12px;display:flex;flex-direction:column;gap:10px}
.hero-card{background:linear-gradient(145deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(212,168,83,.03),transparent,rgba(78,205,196,.03),transparent);animation:heroRotate 15s linear infinite;pointer-events:none}
@keyframes heroRotate{to{transform:rotate(360deg)}}
.hero-portrait{width:100px;height:130px;margin:0 auto;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;z-index:1;border:2px solid var(--border);overflow:hidden}
.hero-portrait::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.4));border-radius:12px}
.hero-name{font-size:18px;font-weight:800;color:var(--gold2);margin-top:10px;position:relative;z-index:1;letter-spacing:2px}
.hero-realm{font-size:13px;color:var(--cyan);margin-top:2px;position:relative;z-index:1}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px;position:relative;z-index:1}
.hs{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:8px 4px}
.hs .hl{font-size:9px;color:rgba(232,224,208,.35)}
.hs .hv{font-size:15px;font-weight:700;color:var(--gold2);margin-top:2px}
.evolve-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.evolve-dots{display:flex;align-items:center;gap:0;justify-content:center;margin-top:8px}
.ev-dot{width:10px;height:10px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);transition:all .3s;flex-shrink:0}
.ev-dot.done{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(212,168,83,.4)}
.ev-dot.now{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 8px rgba(78,205,196,.5);animation:evPulse 2s ease-in-out infinite}
@keyframes evPulse{0%,100%{box-shadow:0 0 8px rgba(78,205,196,.5)}50%{box-shadow:0 0 16px rgba(78,205,196,.8)}}
.ev-line{width:16px;height:2px;background:var(--border);flex-shrink:0}
.ev-label{font-size:10px;color:rgba(232,224,208,.4);text-align:center;margin-top:6px}
.cult-actions{display:flex;flex-direction:column;gap:8px}
.cult-btn{border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:all .2s;border:1px solid var(--border)}
.cult-btn:active{transform:scale(.97)}
.cult-btn .cb-icon{font-size:28px;flex-shrink:0}
.cult-btn .cb-info{flex:1}
.cult-btn .cb-name{font-size:14px;font-weight:700;letter-spacing:1px}
.cult-btn .cb-desc{font-size:10px;color:rgba(232,224,208,.35);margin-top:2px}
.cult-btn.meditate{background:linear-gradient(135deg,rgba(20,40,60,.8),rgba(10,25,40,.8));border-color:rgba(52,152,219,.3)}
.cult-btn.meditate .cb-name{color:var(--blue)}
.cult-btn.study{background:linear-gradient(135deg,rgba(30,30,50,.8),rgba(15,15,35,.8));border-color:rgba(78,205,196,.3)}
.cult-btn.study .cb-name{color:var(--cyan)}
.cult-btn.breakthrough{background:linear-gradient(135deg,rgba(50,40,10,.8),rgba(30,25,5,.8));border-color:rgba(212,168,83,.4)}
.cult-btn.breakthrough .cb-name{color:var(--gold)}
.cult-btn.breakthrough.ready{animation:btReady 2s ease-in-out infinite}
@keyframes btReady{0%,100%{box-shadow:0 0 10px rgba(212,168,83,.1)}50%{box-shadow:0 0 25px rgba(212,168,83,.3)}}

/* ========== 洞府页 ========== */
.cave-page{padding:12px;display:flex;flex-direction:column;gap:10px}
.cave-hd{text-align:center;padding:8px 0}
.cave-hd h2{font-size:18px;color:var(--gold2);letter-spacing:3px}
.cave-hd p{font-size:11px;color:rgba(232,224,208,.35);margin-top:4px}
.cave-qi-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.cave-qi-bar .ql{font-size:12px;color:rgba(232,224,208,.5)}
.cave-qi-bar .qv{font-size:14px;color:var(--cyan);font-weight:700}
.cave-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.cave-room{background:linear-gradient(145deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center;transition:all .2s}
.cave-room:active{transform:scale(.95);border-color:rgba(212,168,83,.3)}
.cave-room .cr-icon{font-size:30px;display:block;margin-bottom:6px}
.cave-room .cr-name{font-size:13px;font-weight:600;color:var(--white);letter-spacing:1px}
.cave-room .cr-desc{font-size:10px;color:rgba(232,224,208,.35);margin-top:3px}
.cave-room .cr-lv{font-size:10px;color:var(--gold);margin-top:4px}
.offline-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px}
.offline-row{display:flex;justify-content:space-between;font-size:12px;color:rgba(232,224,208,.5);padding:3px 0}
.offline-row .ov{font-weight:600}
.offline-row .ov.cyan{color:var(--cyan)}
.offline-row .ov.gold{color:var(--gold2)}

/* ========== 秘境页 ========== */
.realm-page{padding:12px;display:flex;flex-direction:column;gap:10px}
.realm-map{background:linear-gradient(180deg,rgba(10,15,30,.9),rgba(15,25,50,.9));border:1px solid var(--border);border-radius:16px;padding:14px;min-height:180px;position:relative;overflow:hidden}
.realm-map::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(78,205,196,.06),transparent 70%)}
.realm-map-title{font-size:15px;color:var(--gold2);font-weight:700;text-align:center;margin-bottom:10px;position:relative;z-index:1;letter-spacing:2px}
.monster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}
.mon-btn{background:rgba(15,15,30,.8);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center;transition:all .2s}
.mon-btn:active{transform:scale(.93);border-color:rgba(231,76,60,.4)}
.mon-btn .mi{font-size:30px;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.mon-btn .mn{font-size:11px;color:var(--white);margin-top:4px}
.mon-btn .ml{font-size:9px;color:var(--red2)}
.mon-btn.boss{border-color:rgba(212,168,83,.3);background:rgba(40,35,15,.8)}
.mon-btn.boss .ml{color:var(--gold)}
.af-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.af-info{font-size:12px;color:rgba(232,224,208,.5)}
.af-info span{color:var(--cyan);font-weight:600}
.af-btn{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;transition:all .2s}
.af-btn.on{background:var(--red);color:#fff}
.af-btn.off{background:var(--green2);color:#fff}
.af-btn:active{transform:scale(.95)}
.realm-list-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:all .2s}
.realm-list-item:active{transform:scale(.98)}
.realm-list-item.active{border-color:rgba(78,205,196,.4)}
.realm-list-item .rli-icon{font-size:22px}
.realm-list-item .rli-info{flex:1}
.realm-list-item .rli-name{font-size:13px;font-weight:600;color:var(--white)}
.realm-list-item .rli-desc{font-size:10px;color:rgba(232,224,208,.35);margin-top:2px}

/* ========== 背包页 ========== */

function initStartScreen(){
  const c=$('startStars');
  for(let i=0;i<40;i++){
    const s=document.createElement('div');s.className='star';
    s.style.cssText=`left:${rand(0,100)}%;top:${rand(0,100)}%;--d:${rand(2,5)}s;--delay:${rand(0,5)}s;width:${rand(1,3)}px;height:${rand(1,3)}px`;

  }
  if(hasSave()){
    $('startScreen').querySelector('.secondary').style.display='block';
  }else{
    $('startScreen').querySelector('.secondary').style.display='none';
  }

function showCharSelect(){
  $('startScreen').classList.add('hide');
  setTimeout(()=>{
    $('startScreen').style.display='none';
    $('charSelect').classList.add('show');
    renderCharGrid();
  },800);
}

function renderCharGrid(){
  const g=$('charGrid');g.innerHTML='';
  HEROES.forEach(h=>{
    const d=document.createElement('div');
    d.className='cs-char'+(selectedChar===h.id?' selected':'');
    d.innerHTML=`<div class="char-avatar" style="background:linear-gradient(135deg,var(--bg4),var(--bg3))">${h.avatar}</div>
      <div class="char-name">${h.name}</div>
      <div class="char-desc">${h.desc}</div>
      <div class="char-tags">${h.tags.map(t=>`<span class="char-tag">${t}</span>`).join('')}</div>`;
    d.addEventListener('click',()=>{selectedChar=h.id;renderCharGrid()});
    g.appendChild(d);
  });
}

function confirmChar(){
  const name=$('nameInput').value.trim()||'凌霜';
  G.name=name;G.heroId=selectedChar;
  const hero=HEROES.find(h=>h.id===selectedChar);
  if(hero&&hero.bonus){
    if(hero.bonus.luck)G.luck+=hero.bonus.luck;
    if(hero.bonus.atkMul)G.atk=Math.floor(G.atk*(1+hero.bonus.atkMul));
    if(hero.bonus.spd)G.spd+=hero.bonus.spd;
    if(hero.bonus.hpMul)G.mhp=Math.floor(G.mhp*(1+hero.bonus.hpMul));
    if(hero.bonus.crit)G.crit+=hero.bonus.crit;
    if(hero.bonus.allMul){G.atk=Math.floor(G.atk*(1+hero.bonus.allMul));G.def=Math.floor(G.def*(1+hero.bonus.allMul));G.mhp=Math.floor(G.mhp*(1+hero.bonus.allMul))}
  }
  G.hp=G.mhp;
  $('charSelect').classList.remove('show');
  $('gameUI').classList.add('show');
  initGame();
}

function continueGame(){
  loadGame();
  $('startScreen').classList.add('hide');
  setTimeout(()=>{
    $('startScreen').style.display='none';
    $('gameUI').classList.add('show');
    initGame();
  },800);
}

function initGame(){
  initNav();initBuildings();initTownPt();
  updateAll();renderPage('Cult');renderPage('Cave');renderPage('Realm');renderPage('Bag');
  setInterval(saveGame,30000);
}

function initNav(){
  const nav=$('bottomNav');nav.innerHTML='';
  NAVS.forEach((n,i)=>{
    const d=document.createElement('div');d.className='nav-item'+(i===0?' active':'');
    d.innerHTML=`<span class="ni">${n.icon}</span><span class="nl">${n.label}</span>`;
    d.addEventListener('click',()=>switchPage(n.id));
    nav.appendChild(d);
  });
}

function initBuildings(){
  const g=$('bldGrid');g.innerHTML='';
  BLDS.forEach(b=>{
    const d=document.createElement('div');d.className='bld';
    let badge='';
    if(b.badge==='task'){
      const done=(G.tasks.cult>=3?1:0)+(G.tasks.fight>=5?1:0)+(G.tasks.alc>=2?1:0);
      if(done<3)badge=`<div class="bb">${3-done}</div>`;
    }else if(b.badge==='story'){
      const prog=Object.values(G.sp).reduce((a,b)=>a+b,0);
      const total=STORY.reduce((a,c)=>a+c.scenes.length,0);
      if(prog<total)badge=`<div class="bb" style="background:var(--gold)">新</div>`;
    }
    d.innerHTML=`<span class="bi">${b.icon}</span><span class="bn">${b.name}</span><span class="bd">${b.desc}</span>${badge}`;
    d.addEventListener('click',()=>openBld(b.id));
    g.appendChild(d);
  });
}

function initTownPt(){
  const c=$('townPt');c.innerHTML='';
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='tp';
    p.style.cssText=`left:${rand(5,95)}%;top:${rand(30,90)}%;--d:${rand(4,8)}s;--delay:${rand(0,6)}s;width:${rand(1,3)}px;height:${rand(1,3)}px`;
    c.appendChild(p);
  }
}

// ==================== 页面切换 ====================
function switchPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $('pg'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',NAVS[i].id===id));
  if(id==='Realm')renderPage('Realm');
  if(id==='Bag')renderPage('Bag');
}

// ==================== 修炼 ====================
function doCultivate(useLs){
  if(useLs&&G.ls<50){toast('灵石不足','err');return}
  if(useLs)G.ls-=50;
  const base=10+G.ri*5;const gain=Math.floor(base*G.cs*(useLs?3:1)*(0.8+Math.random()*0.4));
  G.xw+=gain;G.txw+=gain;G.tasks.cult=Math.min(G.tasks.cult+1,99);
  ftext(`+${gain}修为`,'#4ecdc4');toast(`修炼获得 ${gain} 修为`,'ok');updateAll();saveGame();
}

function tryBreakthrough(){
  const realm=REALMS[G.ri];const need=realm.xw[G.si];
  if(G.xw<need){toast('修为不足，继续修炼','err');return}
  const ovl=$('btOvl');ovl.classList.add('show');
  $('btRing').textContent=realm.icon;
  const isLast=G.ri>=REALMS.length-1&&G.si>=realm.st.length-1;
  $('btText').textContent=isLast?'飞升成帝！':'渡劫突破中...';
  $('btSub').textContent=isLast?'九九天劫降临':'天道降下雷劫';
  setTimeout(()=>{
    let rate=clamp(0.6+G.luck*0.01+G.btBonus,0.3,0.95);
    if(Math.random()<rate){
      G.xw-=need;G.btBonus=0;
      if(G.si<realm.st.length-1)G.si++;
      else if(G.ri<REALMS.length-1){G.ri++;G.si=0}
      recalcStats();
      ovl.classList.remove('show');
      toast(`🎉 突破成功！${REALMS[G.ri].name}${REALMS[G.ri].st[G.si]}`,'gold');
      ftext('突破成功！','#ffd700');
      G.xy+=10+G.ri*5;updateAll();saveGame();
    }else{
      const loss=Math.floor(need*0.2);G.xw=Math.max(0,G.xw-loss);G.btBonus+=5;
      ovl.classList.remove('show');toast(`突破失败，损失${fmt(loss)}修为`,'err');updateAll();saveGame();
    }
  },2000);
}

function recalcStats(){
  const m=1+G.ri*0.15;
  G.mhp=Math.floor((500+G.ri*200+G.si*50)*m);
  G.atk=Math.floor((50+G.ri*30+G.si*10)*m);
  G.def=Math.floor((30+G.ri*20+G.si*5)*m);
  G.spd=Math.floor((20+G.ri*8+G.si*3)*m);
  G.luck=Math.floor(10+G.ri*3);G.spirit=Math.floor(5+G.ri*2);
  applyEquips();applyTechs();G.hp=G.mhp;
}

function applyEquips(){
  const m=1+G.ri*0.15;
  G.mhp=Math.floor((500+G.ri*200+G.si*50)*m);
  G.atk=Math.floor((50+G.ri*30+G.si*10)*m);
  G.def=Math.floor((30+G.ri*20+G.si*5)*m);
  G.spd=Math.floor((20+G.ri*8+G.si*3)*m);
  G.luck=Math.floor(10+G.ri*3);G.spirit=Math.floor(5+G.ri*2);
  for(const s in G.eq){const eid=G.eq[s];if(!eid)continue;const st=ITEMS[eid];if(!st||!st.stats)continue;
    for(const k in st.stats){if(k==='atk')G.atk+=st.stats[k];else if(k==='def')G.def+=st.stats[k];else if(k==='hp')G.mhp+=st.stats[k];else if(k==='spd')G.spd+=st.stats[k];else if(k==='luck')G.luck+=st.stats[k];else if(k==='spirit')G.spirit+=st.stats[k]}}
  G.hp=Math.min(G.hp,G.mhp);
}

function applyTechs(){
  G.cs=1;
  G.techs.forEach(tid=>{const t=ITEMS[tid];if(!t||!t.eff)return;
    if(t.eff.cs)G.cs+=t.eff.cs;
    if(t.eff.atkM)G.atk=Math.floor(G.atk*(1+t.eff.atkM));
    if(t.eff.all){G.atk=Math.floor(G.atk*(1+t.eff.all));G.def=Math.floor(G.def*(1+t.eff.all));G.mhp=Math.floor(G.mhp*(1+t.eff.all))}
  });
}

// ==================== 战斗 ====================
function startBattle(mid){
  const m=MONSTERS[mid];if(!m)return;
  battle={enemy:{...m},ehp:m.hp,emhp:m.hp,turn:0,log:[],active:true};
  G.hp=G.mhp;
  const ui=$('battleUI');ui.classList.add('show');
  ui.innerHTML=`<div class="battle-top"><span class="battle-title">⚔️ ${m.name}</span><button class="battle-skip" onclick="skipBattle()">跳过</button></div>
  <div class="battle-stage">
    <div class="b-entity player"><span class="be-icon">${PORTRAITS[G.ri].icon}</span><div class="be-name">${G.name}</div><div class="be-hp"><div class="be-hpf" id="bPhp" style="width:100%"></div></div><div class="be-hpt" id="bPHp">${G.hp}/${G.mhp}</div></div>
    <div class="b-vs">⚡ VS ⚡</div>
    <div class="b-entity enemy"><span class="be-icon">${m.icon}</span><div class="be-name">${m.name}</div><div class="be-hp"><div class="be-hpf" id="bEhp" style="width:100%"></div></div><div class="be-hpt" id="bEHp">${m.hp}/${m.hp}</div></div>
  </div>
  <div class="battle-log" id="bLog"><div class="li">战斗开始！</div></div>
  <div class="battle-acts">
    <button class="btn btn-gold" onclick="bAct('atk')">⚔️ 攻击</button>
    <button class="btn btn-cyan" onclick="bAct('skill')">✨ 技能</button>
    <button class="btn btn-green" onclick="bAct('pill')">💊 丹药</button>
    <button class="btn btn-ghost" onclick="bAct('flee')">🏃 逃跑</button>
  </div>`;
}

function bUpd(){
  const pp=Math.max(0,G.hp/G.mhp*100),ep=Math.max(0,battle.ehp/battle.emhp*100);
  const php=$('bPhp'),ehp=$('bEhp');
  if(php)php.style.width=pp+'%';if(ehp)ehp.style.width=ep+'%';
  const ph=$('bPHp'),eh=$('bEHp');
  if(ph)ph.textContent=`${Math.max(0,G.hp)}/${G.mhp}`;
  if(eh)eh.textContent=`${Math.max(0,battle.ehp)}/${battle.emhp}`;
}

function bLog(msg,cls='li'){
  const l=$('bLog');if(!l)return;
  l.innerHTML+=`<div class="${cls}">${msg}</div>`;l.scrollTop=l.scrollHeight;
}

function bAct(act){
  if(!battle||!battle.active)return;
  battle.turn++;
  if(act==='flee'){
    if(Math.random()<0.5){bLog('逃跑成功！','li');endBattle(false)}
    else{bLog('逃跑失败！','li');enemyTurn()}
    return;
  }
  if(act==='pill'){
    const pi=G.bag.findIndex(b=>b.id==='p5');
    if(pi===-1){toast('没有回血丹','err');return}
    G.bag[pi].n--;if(G.bag[pi].n<=0)G.bag.splice(pi,1);
    const h=Math.floor(G.mhp*0.3);G.hp=Math.min(G.mhp,G.hp+h);
    bLog(`服用回血丹 +${h}生命`,'lh');bUpd();enemyTurn();return;
  }
  let dmg=Math.max(1,G.atk-battle.enemy.def*0.5);
  let crit=Math.random()<(0.15+G.crit*0.01);
  if(crit)dmg=Math.floor(dmg*1.5);
  dmg=Math.floor(dmg*(0.9+Math.random()*0.2));
  if(act==='skill'){dmg=Math.floor(dmg*1.8);bLog(`神通！${battle.enemy.name} -${dmg}${crit?' 暴击！':''}`,crit?'lc':'ld')}
  else bLog(`攻击${battle.enemy.name} -${dmg}${crit?' 暴击！':''}`,crit?'lc':'ld');
  battle.ehp-=dmg;bUpd();
  if(battle.ehp<=0){setTimeout(()=>endBattle(true),400);return}
  setTimeout(()=>enemyTurn(),500);
}

function enemyTurn(){
  if(!battle||!battle.active)return;
  let dmg=Math.max(1,battle.enemy.atk-G.def*0.5);
  dmg=Math.floor(dmg*(0.9+Math.random()*0.2));
  G.hp-=dmg;bLog(`${battle.enemy.name} -${dmg}`,'ld');bUpd();
  if(G.hp<=0)setTimeout(()=>endBattle(false),400);
}

function endBattle(won){
  battle.active=false;
  if(won){
    const m=battle.enemy;G.xw+=m.exp;G.txw+=m.exp;G.ls+=m.ls;G.xy+=Math.floor(m.ls*0.1);G.kills++;G.afCount++;G.tasks.fight=Math.min(G.tasks.fight+1,99);
    bLog(`🎉 击败${m.name}！+${m.exp}修为 +${m.ls}灵石`,'li');
    m.drops.forEach(d=>{if(Math.random()<d.r){addItem(d.id,1);bLog(`掉落 ${ITEMS[d.id].icon}${ITEMS[d.id].name}`,'li')}});
    setTimeout(()=>{$('battleUI').classList.remove('show');toast(`击杀${m.name}！+${m.exp}修为`,'ok');updateAll();saveGame()},800);
  }else{
    bLog('💀 战斗失败','ld');
    setTimeout(()=>{$('battleUI').classList.remove('show');toast('战斗失败','err');G.hp=Math.floor(G.mhp*0.3);updateAll()},800);
  }
}

function skipBattle(){
  if(!battle||!battle.active)return;
  while(battle.active){
    let d=Math.max(1,G.atk-battle.enemy.def*0.5);d=Math.floor(d*(0.9+Math.random()*0.2));battle.ehp-=d;
    if(battle.ehp<=0){endBattle(true);return}
    let ed=Math.max(1,battle.enemy.atk-G.def*0.5);ed=Math.floor(ed*(0.9+Math.random()*0.2));G.hp-=ed;
    if(G.hp<=0){endBattle(false);return}
  }
}

// ==================== 挂机 ====================
function toggleAF(){
  G.autoFight=!G.autoFight;const btn=$('afBtn');if(!btn)return;
  if(G.autoFight){btn.textContent='停止挂机';btn.className='af-btn on';doAF();afTimer=setInterval(doAF,2000)}
  else{btn.textContent='开始挂机';btn.className='af-btn off';clearInterval(afTimer)}
}

function doAF(){
  if(!G.autoFight)return;
  const sr=SREALMS[G.curRealm];if(!sr)return;
  const mid=sr.mons[rand(0,sr.mons.length-1)];const m=MONSTERS[mid];
  const dps=G.atk*1.2,edps=Math.max(0,m.atk-G.def*0.5);
  const turns=Math.ceil(m.hp/dps),totalDmg=edps*turns;
  if(totalDmg<G.mhp){
    G.xw+=m.exp;G.txw+=m.exp;G.ls+=m.ls;G.xy+=Math.floor(m.ls*0.1);G.kills++;G.afCount++;
    m.drops.forEach(d=>{if(Math.random()<d.r)addItem(d.id,1)});
  }else{G.autoFight=false;if(afTimer)clearInterval(afTimer);toast('实力不足，挂机停止','err');renderPage('Realm')}
  const info=$('afInfo');if(info)info.innerHTML=`挂机中：击杀 <span>${G.afCount}</span> 只`;
  updateAll();saveGame();
}

      <div><div style="font-size:15px;font-weight:700;color:${rc(r)}">${it.name}</div><div style="font-size:10px;color:rgba(232,224,208,.35);margin-top:2px">${it.desc} · ${cntItem(id)}个</div></div>
    </div>
    ${sh?`<div style="background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:12px">${sh}</div>`:''}
    <div style="display:flex;gap:8px;justify-content:flex-end">${acts}</div>
  </div>`);
}

function useItem(id){const it=ITEMS[id];if(!it||it.type!=='pill'||!rmItem(id))return;
  if(it.eff.xw){G.xw+=it.eff.xw;G.txw+=it.eff.xw;ftext(`+${it.eff.xw}修为`,'#4ecdc4')}
  if(it.eff.btR){G.btBonus+=it.eff.btR;ftext(`突破率+${it.eff.btR}%`,'#ffd700')}
  if(it.eff.heal){const h=Math.floor(G.mhp*it.eff.heal);G.hp=Math.min(G.mhp,G.hp+h);ftext(`+${h}HP`,'#2ecc71')}
  toast(`使用${it.name}`,'ok');updateAll();saveGame()}

function equipItem(id){const it=ITEMS[id];if(!it||it.type!=='equip'||!rmItem(id))return;
  if(G.eq[it.slot])addItem(G.eq[it.slot],1);G.eq[it.slot]=id;applyEquips();applyTechs();
  toast(`装备${it.name}`,'ok');updateAll();saveGame()}

function learnTech(id){if(G.techs.includes(id)){toast('已学过','err');return}if(!rmItem(id))return;
  G.techs.push(id);applyTechs();toast(`学会${ITEMS[id].name}！`,'gold');updateAll();saveGame()}

function sellItem(id){const it=ITEMS[id];if(!it||!rmItem(id))return;G.ls+=Math.floor(it.price*0.3);
  toast(`出售${it.name}`,'ok');updateAll();saveGame()}

// ==================== 炼丹/炼器 ====================
function doAlchemy(rid){
  const r=RECIPES.find(x=>x.id===rid);if(!r)return;
  for(const m of r.mats)if(cntItem(m.id)<m.n){toast(`材料不足：${ITEMS[m.id].name}`,'err');return}
  for(const m of r.mats)rmItem(m.id,m.n);
  if(Math.random()<r.rate){addItem(r.id,1);toast(`🎉 炼丹成功！${ITEMS[r.id].name}`,'gold');G.tasks.alc=Math.min(G.tasks.alc+1,99)}
  else toast('炼丹失败','err');
  openAlchemyModal();updateAll();saveGame();
}

function doForge(eid){
  const costs={e1:{m1:5},e2:{m1:8,h1:3}};const c=costs[eid];if(!c)return;
  for(const k in c)if(cntItem(k)<c[k]){toast(`材料不足`,'err');return}
  for(const k in c)rmItem(k,c[k]);
  if(Math.random()<0.7){addItem(eid,1);toast(`🎉 打造成功！${ITEMS[eid].name}`,'gold')}
  else toast('打造失败','err');
  updateAll();saveGame();
}

function buyItem(id){const it=ITEMS[id];if(!it||G.ls<it.price){toast('灵石不足','err');return}
  G.ls-=it.price;addItem(id,1);toast(`购买${it.name}`,'ok');openShopModal();updateAll();saveGame()}

function divineBuy(id){const costs={p4:100,t3:200,t4:500};const c=costs[id];if(!c||G.xy<c){toast('仙缘不足','err');return}
  G.xy-=c;addItem(id,1);toast(`兑换${ITEMS[id].name}`,'gold');openDivineModal();updateAll();saveGame()}

function claimTask(id){const rw={cult:50,fight:100,alc:80};if(G.tasks[id]<(id==='cult'?3:id==='fight'?5:2))return;
  G.ls+=rw[id]||0;G.tasks[id]=0;toast(`领取 ${rw[id]}灵石`,'gold');openTaskModal();updateAll();saveGame()}

// ==================== 剧情 ====================
function startChapter(chId){
  closeModal();const ch=STORY.find(c=>c.id===chId);if(!ch)return;
  curStory=ch;curScene=G.sp[chId]||0;if(curScene>=ch.scenes.length)curScene=0;
  showScene();$('storyUI').classList.add('show');
}

function showScene(){
  if(!curStory)return;const s=curStory.scenes[curScene];if(!s)return;
  $('sBg').style.background=curStory.bg||'linear-gradient(180deg,#1a0a2a,#0a1a3a)';
  $('sSpeaker').textContent=s.sp?'\u3010'+s.sp+'\u3011':'';
  $('sText').textContent=s.tx;
  const ch=$('sChoices');ch.innerHTML='';
  if(s.ch)s.ch.forEach(c=>{const b=document.createElement('button');b.className='story-ch';b.textContent=c.t;
    b.addEventListener('click',()=>pickChoice(c));ch.appendChild(b)});
  $('sTap').style.display=s.ch?'none':'block';
}

function advStory(){if(!curStory)return;curScene++;if(curScene>=curStory.scenes.length){endChapter();return}showScene()}

function pickChoice(c){
  if(c.rw){if(c.rw.xw){G.xw+=c.rw.xw;G.txw+=c.rw.xw}if(c.rw.ls)G.ls+=c.rw.ls;if(c.rw.item)addItem(c.rw.item,1)}
  if(c.n===-1){endChapter();return}curScene=c.n;showScene();
}

function endChapter(){
  if(curStory){
    G.sp[curStory.id]=curStory.scenes.length;
    const last=curStory.scenes[curStory.scenes.length-1];
    if(last&&last.rw){const r=last.rw;if(r.xw){G.xw+=r.xw;G.txw+=r.xw}if(r.ls)G.ls+=r.ls;if(r.item)addItem(r.item,1)}
  }
  $('storyUI').classList.remove('show');toast('剧情完成！','gold');updateAll();saveGame();initBuildings();
}

// ==================== 页面渲染 ====================
function renderPage(id){
  if(id==='Cult')renderCult();
  else if(id==='Cave')renderCave();
  else if(id==='Realm')renderRealm();
  else if(id==='Bag')renderBag();
}

function renderCult(){
  const realm=REALMS[G.ri];const p=PORTRAITS[G.ri];
  const need=realm.xw[G.si];const pct=Math.min(100,G.xw/need*100);
  const canBT=G.xw>=need;
  let dots='';const show=Math.min(6,REALMS.length);const start=Math.max(0,G.ri-2);
  for(let i=start;i<start+show&&i<REALMS.length;i++){
    const done=i<G.ri||(i===G.ri&&G.si>=REALMS[i].st.length-1);
    dots+=`<div class="ev-dot ${done?'done':''} ${i===G.ri?'now':''}"></div>`;
    if(i<start+show-1&&i<REALMS.length-1)dots+=`<div class="ev-line"></div>`;
  }
  let techs='';G.techs.forEach(tid=>{const t=ITEMS[tid];if(!t)return;
    techs+=`<div class="list-item"><span class="li-icon">${t.icon}</span><div class="li-info"><div class="li-name" style="color:${rc(t.r||'white')}">${t.name}</div><div class="li-desc">${t.desc}</div></div><span style="font-size:10px;color:var(--green)">已修炼</span></div>`});

  $('pgCult').innerHTML=`<div class="cult-page">
    <div class="hero-card">
      <div class="hero-portrait" style="background:${p.bg}"><span style="position:relative;z-index:1">${p.icon}</span></div>
      <div class="hero-name">${G.name}</div>
      <div class="hero-realm">${realm.name}期 · ${realm.st[G.si]}</div>
      <div class="hero-stats">
        <div class="hs"><div class="hl">⚔️ 攻击</div><div class="hv">${G.atk}</div></div>
        <div class="hs"><div class="hl">🛡️ 防御</div><div class="hv">${G.def}</div></div>
        <div class="hs"><div class="hl">❤️ 生命</div><div class="hv">${G.mhp}</div></div>
        <div class="hs"><div class="hl">💨 速度</div><div class="hv">${G.spd}</div></div>
        <div class="hs"><div class="hl">🍀 气运</div><div class="hv">${G.luck}</div></div>
        <div class="hs"><div class="hl">✨ 神识</div><div class="hv">${G.spirit}</div></div>
      </div>
    </div>
    <div class="evolve-bar">
      <div style="font-size:11px;color:rgba(232,224,208,.4);letter-spacing:1px">境界蜕变之路</div>
      <div class="evolve-dots">${dots}</div>
      <div class="ev-label">当前：${realm.name}期</div>
    </div>
    <div class="cult-actions">
      <div class="cult-btn meditate" onclick="doCultivate(false)"><span class="cb-icon">🧘‍♀️</span><div class="cb-info"><div class="cb-name">打坐修炼</div><div class="cb-desc">闭目凝神，感悟天地灵气</div></div></div>
      <div class="cult-btn study" onclick="doCultivate(true)"><span class="cb-icon">📚</span><div class="cb-info"><div class="cb-name">研读功法</div><div class="cb-desc">消耗50灵石，修炼速度×3</div></div></div>
      <div class="cult-btn breakthrough ${canBT?'ready':''}" onclick="tryBreakthrough()"><span class="cb-icon">⚡</span><div class="cb-info"><div class="cb-name">尝试突破</div><div class="cb-desc">${canBT?'修为已满，可以突破！':'还需 '+fmt(need-G.xw)+' 修为'}</div></div></div>
    </div>
    <div class="section-hd">功 法</div>
    ${techs||'<div style="text-align:center;padding:16px;color:rgba(232,224,208,.2)">暂无功法</div>'}
  </div>`;
}

function renderCave(){
  calcOffline();
  $('pgCave').innerHTML=`<div class="cave-page">
    <div class="cave-hd"><h2>🏔️ 洞府</h2><p>灵气浓度影响修炼速度</p></div>
    <div class="cave-qi-bar"><span class="ql">🌿 灵气浓度</span><span class="qv">×${G.cs.toFixed(1)}</span></div>
    <div class="cave-grid">
      <div class="cave-room" onclick="openCultivateModal()"><span class="cr-icon">🧘‍♀️</span><span class="cr-name">修炼室</span><span class="cr-desc">打坐吐纳</span></div>
      <div class="cave-room" onclick="openBld('alchemy')"><span class="cr-icon">⚗️</span><span class="cr-name">丹房</span><span class="cr-desc">炼制丹药</span></div>
      <div class="cave-room" onclick="openBld('forge')"><span class="cr-icon">🔨</span><span class="cr-name">器室</span><span class="cr-desc">打造法器</span></div>
      <div class="cave-room" onclick="plantHerb()"><span class="cr-icon">🌱</span><span class="cr-name">药圃</span><span class="cr-desc">种植灵草</span></div>
      <div class="cave-room" onclick="upgradeArray()"><span class="cr-icon">🔮</span><span class="cr-name">聚灵阵</span><span class="cr-desc">提升灵气</span></div>
      <div class="cave-room" onclick="toast('灵兽园开发中')"><span class="cr-icon">🐾</span><span class="cr-name">灵兽园</span><span class="cr-desc">培养灵兽</span></div>
    </div>
    <div class="section-hd">离 线 收 益</div>
    <div class="offline-box">
      <div class="offline-row"><span>⏱️ 离线时长</span><span class="ov">${G.offTime||'0分钟'}</span></div>
      <div class="offline-row"><span>✨ 离线修为</span><span class="ov cyan">+${fmt(G.offXw)}</span></div>
      <div class="offline-row"><span>💰 离线灵石</span><span class="ov gold">+${fmt(G.offLs)}</span></div>
      <button class="btn btn-gold btn-block" style="margin-top:10px" onclick="collectOffline()">一键领取</button>
    </div>
  </div>`;
}

function renderRealm(){
  const sr=SREALMS[G.curRealm];
  let mons='';if(sr)sr.mons.forEach(mid=>{const m=MONSTERS[mid];const boss=m.rl>=3;
    mons+=`<div class="mon-btn ${boss?'boss':''}" onclick="startBattle(${mid})"><span class="mi">${m.icon}</span><span class="mn">${m.name}</span><span class="ml">${boss?'BOSS':'Lv.'+m.rl}</span></div>`});
  let list='';SREALMS.forEach((r,i)=>{const locked=G.ri<r.min;const active=G.curRealm===i;
    list+=`<div class="realm-list-item ${active?'active':''}" onclick="${locked?'':`selectRealm(${i})`}" style="${locked?'opacity:.4':''}"><span class="rli-icon">${locked?'🔒':r.icon}</span><div class="rli-info"><div class="rli-name">${r.name}</div><div class="rli-desc">${locked?`需要${REALMS[r.min].name}期`:r.desc}</div></div>${active?'<span style="color:var(--cyan)">●</span>':''}</div>`});

  $('pgRealm').innerHTML=`<div class="realm-page">
    <div class="realm-map"><div class="realm-map-title">${sr?sr.icon+' '+sr.name:'选择秘境'}</div><div class="monster-grid">${mons}</div></div>
    <div class="af-bar"><span class="af-info" id="afInfo">挂机中：击杀 <span>${G.afCount}</span> 只</span><button class="af-btn ${G.autoFight?'on':'off'}" id="afBtn" onclick="toggleAF()">${G.autoFight?'停止挂机':'开始挂机'}</button></div>
    <div class="section-hd">秘 境 列 表</div>
    ${list}
  </div>`;
}

function renderBag(){
  let items=G.bag.slice();
  if(curBagTab===1)items=items.filter(b=>ITEMS[b.id]&&ITEMS[b.id].type==='equip');
  else if(curBagTab===2)items=items.filter(b=>ITEMS[b.id]&&ITEMS[b.id].type==='pill');
  else if(curBagTab===3)items=items.filter(b=>ITEMS[b.id]&&ITEMS[b.id].type==='mat');
  else if(curBagTab===4)items=items.filter(b=>ITEMS[b.id]&&ITEMS[b.id].type==='tech');
  let grid='';
  for(let i=0;i<40;i++){
    if(i<items.length){const b=items[i];const it=ITEMS[b.id];if(!it)continue;const r=it.r||'white';
      grid+=`<div class="bag-slot r-${r}" onclick="showItem('${b.id}')"><div class="sr"></div><span class="si">${it.icon}</span><span class="sn">${it.name}</span>${b.n>1?`<span class="sc">×${b.n}</span>`:''}</div>`}
    else grid+=`<div class="bag-slot empty"></div>`;
  }
  const tabs=['全部','装备','丹药','材料','功法'].map((t,i)=>`<div class="bag-tab ${i===curBagTab?'active':''}" onclick="switchBagTab(${i})">${t}</div>`).join('');
  $('pgBag').innerHTML=`<div class="bag-page"><div class="bag-tabs">${tabs}</div><div class="bag-grid">${grid}</div>
    <div class="bag-actions"><button class="ba-btn" onclick="toast('已整理','ok')">📦 整理</button><button class="ba-btn" onclick="sellAll()">💰 出售材料</button></div></div>`;
}

function selectRealm(i){G.curRealm=i;renderPage('Realm')}

function plantHerb(){if(G.ls<10){toast('灵石不足','err');return}G.ls-=10;toast('种植成功，30秒后收获','ok');
  setTimeout(()=>{addItem('h1',rand(1,3));toast('🌿 灵草成熟！','ok');updateAll();saveGame()},30000);updateAll();saveGame()}

function upgradeArray(){if(G.ls<500){toast('灵石不足','err');return}G.ls-=500;G.cs+=0.2;applyTechs();
  toast(`聚灵阵升级！×${G.cs.toFixed(1)}`,'gold');updateAll();saveGame()}

function sellAll(){let t=0;G.bag=G.bag.filter(b=>{const it=ITEMS[b.id];if(!it)return false;if(it.type==='mat'){t+=Math.floor(it.price*0.3)*b.n;return false}return true});
  G.ls+=t;toast(`出售材料 +${fmt(t)}灵石`,'ok');renderPage('Bag');updateAll();saveGame()}

// ==================== 角色信息 ====================
function showPlayerInfo(){
  const realm=REALMS[G.ri];
  openModal(`<div class="modal-head"><h3>👤 角色信息</h3><button class="modal-x" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:48px">${PORTRAITS[G.ri].icon}</div>
      <div style="font-size:18px;font-weight:800;color:var(--gold2);margin-top:8px;letter-spacing:2px">${G.name}</div>
      <div style="font-size:13px;color:${realm.color};margin-top:4px">${realm.name}期 · ${realm.st[G.si]}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px">
      <div class="hs"><div class="hl">⚔️ 攻击</div><div class="hv">${G.atk}</div></div>
      <div class="hs"><div class="hl">🛡️ 防御</div><div class="hv">${G.def}</div></div>
      <div class="hs"><div class="hl">❤️ 生命</div><div class="hv">${G.mhp}</div></div>
      <div class="hs"><div class="hl">💨 速度</div><div class="hv">${G.spd}</div></div>
      <div class="hs"><div class="hl">🍀 气运</div><div class="hv">${G.luck}</div></div>
      <div class="hs"><div class="hl">✨ 神识</div><div class="hv">${G.spirit}</div></div>
    </div>
    <div style="font-size:12px;color:rgba(232,224,208,.4);line-height:2.2">
      <div class="offline-row"><span>📊 总修为</span><span class="ov">${fmt(G.txw)}</span></div>
      <div class="offline-row"><span>💰 灵石</span><span class="ov gold">${fmt(G.ls)}</span></div>
      <div class="offline-row"><span>🪙 仙缘</span><span class="ov gold">${fmt(G.xy)}</span></div>
      <div class="offline-row"><span>⚔️ 击杀</span><span class="ov">${G.kills}</span></div>
      <div class="offline-row"><span>🌿 修炼速度</span><span class="ov cyan">×${G.cs.toFixed(1)}</span></div>
    </div>
  </div>`);
}

// ==================== 离线 ====================
function calcOffline(){
  const now=Date.now();const mins=(now-G.lastOn)/60000;
  if(mins<1){G.offXw=0;G.offLs=0;G.offTime='0分钟';return}
  G.offXw=Math.floor(mins*5*G.cs);G.offLs=Math.floor(mins*2*G.cs);
  G.offTime=mins>=60?`${(mins/60).toFixed(1)}小时`:`${Math.floor(mins)}分钟`;
}

function collectOffline(){
  if(G.offXw<=0&&G.offLs<=0){toast('暂无离线收益','err');return}
  G.xw+=G.offXw;G.txw+=G.offXw;G.ls+=G.offLs;
  toast(`领取 +${fmt(G.offXw)}修为 +${fmt(G.offLs)}灵石`,'gold');
  G.offXw=0;G.offLs=0;G.lastOn=Date.now();updateAll();saveGame();renderPage('Cave');
}

// ==================== 全局更新 ====================
function updateAll(){
  const realm=REALMS[G.ri];const need=realm.xw[G.si];const pct=Math.min(100,G.xw/need*100);
  $('pName').textContent=G.name;
  $('avatarBadge').textContent=realm.name.substring(0,2);
  $('pRealm').textContent=`${realm.name}期 · ${realm.st[G.si]}`;
  $('avatarC').textContent=PORTRAITS[G.ri].icon;
  $('rLs').textContent=fmt(G.ls);$('rXy').textContent=fmt(G.xy);
  $('rXw').textContent=`${fmt(G.xw)}/${fmt(need)}`;
  $('xwBar').style.width=pct+'%';
  $('xwLabel').textContent=`修为 ${fmt(G.xw)}/${fmt(need)}`;
  initBuildings();
}

// ==================== 存档 ====================
function saveGame(){try{G.lastOn=Date.now();localStorage.setItem('xx_save',JSON.stringify(G))}catch(e){}}
function loadGame(){
  try{const d=localStorage.getItem('xx_save');if(!d)return;const s=JSON.parse(d);
    G.ri=clamp(s.ri||0,0,REALMS.length-1);G.si=clamp(s.si||0,0,REALMS[G.ri].st.length-1);
    G.xw=s.xw||0;G.txw=s.txw||0;G.ls=s.ls||1000;G.xy=s.xy||0;
    G.hp=s.hp||500;G.mhp=s.mhp||500;G.atk=s.atk||50;G.def=s.def||30;
    G.spd=s.spd||20;G.luck=s.luck||10;G.spirit=s.spirit||5;G.crit=s.crit||5;
    G.bag=s.bag||[];G.eq=s.eq||{weapon:null,armor:null,acc:null};
    G.techs=s.techs||['t1'];G.curRealm=s.curRealm||0;G.afCount=s.afCount||0;
    G.sp=s.sp||{};G.tasks=s.tasks||{cult:0,fight:0,alc:0};
    G.lastOn=s.lastOn||Date.now();G.kills=s.kills||0;G.btBonus=s.btBonus||0;G.cs=s.cs||1;
    G.name=s.name||'凌霜';G.heroId=s.heroId||'ice';
    recalcStats();calcOffline();
  }catch(e){console.error('Load error:',e)}
}

// ==================== 启动 ====================
document.addEventListener('DOMContentLoaded',()=>{initStartScreen()});
</script>
</body>
